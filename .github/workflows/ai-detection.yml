name: 🤖 AI Code Detection & Analysis

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "**/*.ts"
      - "**/*.js"
      - "**/*.tsx"
      - "**/*.jsx"
      - "**/*.py"
      - "**/*.java"
      - "**/*.go"
      - "**/*.rs"
      - "**/*.cpp"
      - "**/*.c"
      - "**/*.sql"
      - "**/*.md"

jobs:
  ai-detection:
    runs-on: ubuntu-latest
    name: 🔍 Analyze AI Code Involvement

    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      - name: 🧹 Clear GitHub Actions cache
        run: |
          gh extension install actions/gh-actions-cache

          REPO=${{ github.repository }}
          BRANCH="refs/pull/${{ github.event.number }}/merge"

          echo "Fetching list of cache key"
          cacheKeysForPR=$(gh actions-cache list -R $REPO -B $BRANCH | cut -f 1 )

          ## Setting this to not fail the workflow while deleting cache keys. 
          set +e
          echo "Deleting caches..."
          for cacheKey in $cacheKeysForPR
          do
              gh actions-cache delete $cacheKey -R $REPO -B $BRANCH --confirm
          done
          echo "Done"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r .github/scripts/requirements.txt

      - name: 🧠 Run AI Detection Analysis
        id: ai-analysis
        run: |
          python .github/scripts/detect_ai_code.py \
            --pr-number ${{ github.event.number }} \
            --base-ref ${{ github.event.pull_request.base.sha }} \
            --head-ref ${{ github.event.pull_request.head.sha }} \
            --repo-path . \
            --output-format json \
            --detailed-analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: 📊 Generate AI Analysis Report
        id: generate-report
        run: |
          python .github/scripts/generate_ai_report.py \
            --analysis-file ai-analysis-results.json \
            --template-file .github/templates/ai-report-template.md \
            --output-file ai-report.md

      - name: 💬 Post AI Analysis Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Read the generated report
            const reportPath = 'ai-report.md';
            if (!fs.existsSync(reportPath)) {
              console.log('No AI report generated');
              return;
            }

            const report = fs.readFileSync(reportPath, 'utf8');

            // Find existing AI analysis comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('🤖 AI Code Analysis')
            );

            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: report
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: report
              });
            }

      - name: 🏷️ Add AI Involvement Labels
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const analysisFile = 'ai-analysis-results.json';

            if (!fs.existsSync(analysisFile)) {
              console.log('No analysis results found');
              return;
            }

            const analysis = JSON.parse(fs.readFileSync(analysisFile, 'utf8'));
            const aiPercentage = analysis.overall_ai_percentage || 0;

            // Remove existing AI labels
            const existingLabels = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const aiLabelsToRemove = existingLabels.data
              .filter(label => label.name.startsWith('🤖 ai-'))
              .map(label => label.name);

            for (const label of aiLabelsToRemove) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: label
              });
            }

            // Add new AI percentage label
            let newLabel;
            if (aiPercentage >= 80) {
              newLabel = '🤖 ai-heavy (80%+)';
            } else if (aiPercentage >= 50) {
              newLabel = '🤖 ai-significant (50-79%)';
            } else if (aiPercentage >= 20) {
              newLabel = '🤖 ai-moderate (20-49%)';
            } else if (aiPercentage >= 5) {
              newLabel = '🤖 ai-minimal (5-19%)';
            } else {
              newLabel = '🤖 ai-none (0-4%)';
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [newLabel]
            });

      - name: 📈 Create Check Run
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const analysisFile = 'ai-analysis-results.json';

            if (!fs.existsSync(analysisFile)) {
              return;
            }

            const analysis = JSON.parse(fs.readFileSync(analysisFile, 'utf8'));
            const aiPercentage = analysis.overall_ai_percentage || 0;

            // Determine check status
            let conclusion = 'success';
            let title = '🤖 AI Analysis Complete';
            let summary = `AI involvement: ${aiPercentage.toFixed(1)}%`;

            if (aiPercentage >= 90) {
              conclusion = 'failure';
              title = '🚨 High AI Involvement Detected';
              summary = `⚠️ This PR contains ${aiPercentage.toFixed(1)}% AI-generated code. Manual review recommended.`;
            } else if (aiPercentage >= 70) {
              conclusion = 'neutral';
              title = '⚠️ Significant AI Involvement';
              summary = `This PR contains ${aiPercentage.toFixed(1)}% AI-generated code.`;
            }

            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'AI Code Analysis',
              head_sha: context.payload.pull_request.head.sha,
              status: 'completed',
              conclusion: conclusion,
              output: {
                title: title,
                summary: summary,
                text: `Detailed analysis:\n- Files analyzed: ${analysis.files_analyzed}\n- AI-generated files: ${analysis.ai_files_count}\n- Human-written files: ${analysis.human_files_count}\n- Mixed files: ${analysis.mixed_files_count}`
              }
            });

      - name: 🗃️ Upload Analysis Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ai-analysis-results
          path: |
            ai-analysis-results.json
            ai-report.md
            ai-analysis-debug.log
          retention-days: 30
